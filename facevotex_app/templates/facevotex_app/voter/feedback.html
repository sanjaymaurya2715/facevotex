<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback Form</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Background */
        body {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Card Design */
        .feedback-card {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 30px;
            width: 100%;
            max-width: 500px;
        }

        .feedback-card h3 {
            font-weight: 600;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Input Focus Effect */
        .form-control:focus {
            box-shadow: none;
            border-color: #4e73df;
        }

        /* Button */
        .btn-custom {
            background-color: #4e73df;
            color: white;
            font-weight: 500;
            border-radius: 8px;
        }

        .btn-custom:hover {
            background-color: #2e59d9;
        }

        /* Star Rating */
        .rating {
            direction: rtl;
            display: inline-flex;
        }

        .rating input {
            display: none;
        }

        .rating label {
            font-size: 30px;
            color: #ccc;
            cursor: pointer;
            transition: 0.3s;
        }

        .rating label:hover,
        .rating label:hover ~ label,
        .rating input:checked ~ label {
            color: #ffc107;
        }
    </style>
</head>
<body>

 {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-danger alert-dismissible fade show w-50 mx-auto text-center" role="alert">
        <strong>{{ msg }}</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}   

    

<div class="feedback-card">
    <h3>Feedback Form</h3>

    <form method ="post" action="/voter_feedback/">
           {%csrf_token%}

        <!-- Rating -->
        <div class="mb-3">
            <label class="form-label d-block">Rate Us</label>
            <div class="rating">
                <input type="radio" id="star5" name="rating" value="5">
                <label for="star5">&#9733;</label>

                <input type="radio" id="star4" name="rating" value="4">
                <label for="star4">&#9733;</label>

                <input type="radio" id="star3" name="rating" value="3">
                <label for="star3">&#9733;</label>

                <input type="radio" id="star2" name="rating" value="2">
                <label for="star2">&#9733;</label>

                <input type="radio" id="star1" name="rating" value="1">
                <label for="star1">&#9733;</label>
            </div>
        </div>

        <!-- Feedback Message -->
        <div class="mb-3">
            <label class="form-label">Your Feedback</label>
            <textarea class="form-control" rows="4" placeholder="Write your feedback here..." required name="message"message></textarea>
        </div>

        <!-- Submit Button -->
        <div class="d-grid">
            <button type="submit" class="btn btn-custom">Submit Feedback</button>
        </div>
    </form>
</div>

</body>
</html>
