<!DOCTYPE html>
<html lang="en">
<head>

    {% include 'facevotex_app/common_html/common_css.html'%}

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voter Home</title>

<style>

body{
    margin:0;
    padding:0;
    background:#f4f6fb;
    font-family:Arial, Helvetica, sans-serif;
}

/* Main container */

.container{
    width:900px;
    margin:auto;
    margin-top:60px;
}

/* Profile Card */

.profile_card{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* Profile section */

.profile_image{
    width:150px;
    height:150px;
    border-radius:50%;
    border:5px solid #4a6cf7;
    object-fit:cover;
}

/* Name */

.name{
    font-size:28px;
    font-weight:bold;
    margin-top:20px;
    color:#333;
}

/* Email */

.email{
    font-size:18px;
    color:#666;
}

/* Title */

.heading{
    font-size:32px;
    font-weight:bold;
    margin-bottom:20px;
    color:#222;
}

/* Buttons */

.button{
    margin-top:25px;
}

.button a{
    text-decoration:none;
    padding:12px 25px;
    background:#4a6cf7;
    color:white;
    border-radius:6px;
    font-size:16px;
}

.button a:hover{
    background:#2f4de0;
}

</style>

</head>

<body>

{% include 'facevotex_app/voter/voter_header.html'%}


 {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-danger alert-dismissible fade show w-50 mx-auto text-center" role="alert">
        <strong>{{ msg }}</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}   


<div class="container">

<div class="profile_card">

<h1 class="heading">Voter home edit</h1>

<center>

<img class="profile_image" src="{{voter.profile_pic.url}}" alt="profile">
<form method="POST" action="/voter_home_edit/" enctype="multipart/form-data">
  {% csrf_token %}
<div class="input-group">
                        <label>Full Name</label>
                        <input type="text" name="name" placeholder="Enter your full name" value="{{voter.name}}" required>
                    </div>


<div class="input-group">
{{voter.email}}
</div>

 <div class="input-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" placeholder="Enter phone number" value="{{voter.phone}}" required>
                    </div>


<div class="input-group">
                        <label>Profile Picture</label>
                        <input type="file" name="profile_pic" accept="image/*">

                    </div>
                    
                    
 <button class="btn btn-success" type="submit"> save data</button>




</center>
</form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</div>

</div>

</body>
</html>
