<!DOCTYPE html>
<html lang="en">

<head>

    {% include 'facevotex_app/common_html/common_css.html'%}

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Poll Creator Dashboard</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f4f6fb;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            width: 900px;
            margin: auto;
            margin-top: 60px;
        }

        .profile_card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .profile_image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #4a6cf7;
            object-fit: cover;
        }

        .heading {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #222;
        }

        .name {
            font-size: 28px;
            font-weight: bold;
            margin-top: 20px;
            color: #333;
        }

        .email {
            font-size: 18px;
            color: #666;
            margin-top: 5px;
        }

        .contact {
            font-size: 18px;
            color: #666;
            margin-top: 5px;
        }

        .button {
            margin-top: 30px;
        }

        .button a {
            text-decoration: none;
            padding: 12px 25px;
            background: #4a6cf7;
            color: white;
            border-radius: 6px;
            font-size: 16px;
            margin: 10px;
        }

        .button a:hover {
            background: #2f4de0;
        }
    </style>

</head>

<body>

    {% include 'facevotex_app/poll_creator/creator_header.html'%}

     {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-danger alert-dismissible fade show w-50 mx-auto text-center" role="alert">
        <strong>{{ msg }}</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}   


    <div class="container">

        <div class="profile_card">

            <h1 class="heading">Poll Creator Edit Profile</h1>

            <center>

                <img class="profile_image" src="{{creator.profile_pic.url}}" alt="profile">
                 <form method="POST" action="/creator_edit_profile/" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" name="name" placeholder="Enter your full name" value="{{creator.name}}" required>
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="Enter your email" value="{{creator.email}}" readonly required>
                    </div>

               

                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" placeholder="Enter phone number" value="{{creator.phone}}" required>
                    </div>
                    <div class="input-group">
                        <label>Profile Picture</label>
                        <input type="file" name="profile_picture" accept="image/*">

                    </div>

                    <button class="btn btn-success" type="submit"> save data</button>

            </center>

            </form>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
